<!DOCTYPE html>
<!--

Microcosm
https://www.github.com/Zushah/Microcosm

-->
<html>
    <head>
        <meta charset="utf-8">
        <title>Microcosm</title>
        <link href="./assets/logo.png" rel="icon" type="image/x-icon">
        <link rel="stylesheet" href="./src/styles/main-beta.css">
    </head>
    <body>
        <main class="microcosmLayout">
            <section class="panel visualPanel" aria-label="Microcosm visualization">
                <canvas id="wasmgpuCanvas"></canvas>
            </section>
            <section class="panel summaryPanel">
                <header class="titleBlock">
                    <h1>MICROCOSM</h1>
                    <p class="subtitle">Rust computation - WasmGPU visualization</p>
                    <div id="status">Loading...</div>
                </header>
                <div class="controls">
                    <label class="field">
                        <span>Seed</span>
                        <input id="seedInput" type="text" spellcheck="false" autocomplete="off" placeholder="42">
                    </label>
                    <label class="field">
                        <span>Display mode</span>
                        <select id="displayMode"></select>
                    </label>
                    <label class="field">
                        <span>Interaction mode</span>
                        <select id="interactionMode">
                            <option value="explore">Explore</option>
                            <option value="edit">Edit enval</option>
                        </select>
                    </label>
                    <div class="buttonRow">
                        <button id="pauseButton" type="button">Pause</button>
                        <button id="stepButton" type="button">Step once</button>
                        <button id="resetButton" type="button">Reset</button>
                    </div>
                </div>
                <section class="infoBlock">
                    <h2>Renderer</h2>
                    <div id="renderStats"></div>
                </section>
            </section>
            <section class="panel diagnosticsPanel">
                <section class="infoBlock">
                    <h2>Runtime diagnostics</h2>
                    <div id="diagnostics"></div>
                </section>
                <section class="infoBlock growBlock">
                    <h2>Render-buffer views</h2>
                    <div id="views"></div>
                </section>
            </section>
            <section class="panel detailsPanel">
                <section class="infoBlock inspectorBlock">
                    <div class="sectionHeader">
                        <h2>Interaction and inspection</h2>
                        <div class="buttonRow compactButtons">
                            <button id="clearSelectionButton" type="button">Clear selection</button>
                            <button id="clearLineageButton" type="button">Clear lineage</button>
                            <button id="copyInspectionButton" type="button">Copy JSON</button>
                        </div>
                    </div>
                    <div class="brushControls">
                        <label class="field">
                            <span>Brush width</span>
                            <input id="brushWidth" type="number" min="1" step="1" value="10">
                        </label>
                        <label class="field">
                            <span>Brush height</span>
                            <input id="brushHeight" type="number" min="1" step="1" value="10">
                        </label>
                        <label class="field">
                            <span>Δ enval</span>
                            <input id="brushDelta" type="number" step="0.01" value="0.05">
                        </label>
                    </div>
                    <div class="inspectionGrid">
                        <section>
                            <h3>Hover tile</h3>
                            <div id="hoverInspector" class="inspectorPane"></div>
                        </section>
                        <section>
                            <h3>Selected tile</h3>
                            <div id="tileInspector" class="inspectorPane"></div>
                        </section>
                        <section>
                            <h3>Selected cell</h3>
                            <div id="cellInspector" class="inspectorPane"></div>
                        </section>
                        <section>
                            <h3>Lineage and edit</h3>
                            <div id="lineageInspector" class="inspectorPane"></div>
                        </section>
                    </div>
                </section>
                <section class="infoBlock memoryBlock">
                    <h2>Live memory samples</h2>
                    <div id="samples"></div>
                </section>
                <section class="infoBlock errorBlock">
                    <h2>Errors</h2>
                    <pre id="errors"></pre>
                </section>
            </section>
        </main>
        <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/Zushah/WasmGPU@0.8.0/dist/WasmGPU.iife.min.js"></script>
        <script type="module" src="./src/main-beta.js"></script>
    </body>
</html>
